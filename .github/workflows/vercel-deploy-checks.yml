name: Vercel deploy checks

on:
  repository_dispatch:
    types:
      - vercel.deployment.ready

permissions:
  contents: read
  statuses: write

concurrency:
  group: vercel-deploy-checks-${{ github.event.client_payload.git.sha }}
  cancel-in-progress: true

jobs:
  vercel-production-lint:
    name: vercel-production-lint
    if: |
      github.event.client_payload.environment == 'production' &&
      github.event.client_payload.git.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out deployed commit
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - sharplyphoto production: lint"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  vercel-production-unit-tests:
    name: vercel-production-unit-tests
    if: |
      github.event.client_payload.environment == 'production' &&
      github.event.client_payload.git.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out deployed commit
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - sharplyphoto production: unit tests"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
